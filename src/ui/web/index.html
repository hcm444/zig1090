<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zig1090 map</title>
  <link rel="stylesheet" href="/static/leaflet/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; }
    #map { height: 100%; width: 100%; }
    #panel {
      position: absolute; top: 10px; right: 10px; z-index: 1000;
      background: rgba(0,0,0,.78); color: #e8e8e8; padding: 12px 14px;
      border-radius: 8px; max-width: min(420px, 92vw); font-size: 13px;
      line-height: 1.45; pointer-events: auto;
    }
    #panel h2 { margin: 0 0 8px; font-size: 15px; font-weight: 600; color: #fff; }
    #panel .muted { color: #9aa; font-size: 12px; }
    #panel kbd { display: block; margin-top: 8px; color: #7ad; font-size: 11px; }
    .controls { display: grid; grid-template-columns: 1fr auto; gap: 6px 10px; align-items: center; margin: 8px 0 2px; }
    .controls label { color: #d7d7d7; font-size: 12px; }
    .controls input { transform: translateY(1px); }

    .ac-arrow-wrap {
      width: 0 !important; height: 0 !important;
    }
    .ac-arrow {
      margin-left: -12px; margin-top: -12px;
      width: 24px; height: 24px; text-align: center; line-height: 24px;
      font-size: 18px; color: #0af; text-shadow: 0 0 3px #000, 0 0 6px #000;
      transform-origin: center center;
    }

    #acDetail .ac-detail { margin-top: 6px; font-size: 11px; line-height: 1.4; color: #e0e0e0; }
    #acDetail .ac-detail h3 { margin: 0 0 8px; font-size: 14px; font-weight: 600; color: #fff; }
    #acDetail .ac-detail .ac-h2 {
      margin: 10px 0 4px; letter-spacing: 0.04em; text-transform: uppercase;
      font-size: 10px; font-weight: 600; color: #9aa;
    }
    #acDetail .ac-detail .ac-h2:first-of-type { margin-top: 0; }
    #acDetail .ac-detail dl.ac-grid {
      display: grid; grid-template-columns: minmax(7.5em, 10em) 1fr;
      gap: 2px 10px; align-items: center; margin: 0; padding: 0;
    }
    #acDetail .ac-detail dl.ac-grid dt { margin: 0; padding: 2px 0; color: #9aa; font-weight: 500; }
    #acDetail .ac-detail dl.ac-grid dd { margin: 0; padding: 2px 0; font-family: ui-monospace, monospace; color: #e8e8e8; word-break: break-word; }
    #acDetail .ac-detail .ac-hint { margin-top: 8px; color: #7ad; font-size: 10px; line-height: 1.3; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel">
    <h2>zig1090</h2>
    <div class="muted">Polls <code>/aircraft.json</code>. Range rings use receiver <code>--lat</code>/<code>--lon</code>.</div>
    <div class="controls">
      <label for="swLight">Light map</label> <input id="swLight" type="checkbox" />
      <label for="swRanges">Range rings</label> <input id="swRanges" type="checkbox" />
      <label for="swCoverage">Coverage</label> <input id="swCoverage" type="checkbox" />
      <label for="swFog">Fog</label> <input id="swFog" type="checkbox" />
    </div>
    <div id="acDetail"><p class="muted" style="margin:8px 0 0">Click an aircraft for full decoded fields.</p></div>
    <kbd id="hint">Loading…</kbd>
  </div>
  <script src="/static/leaflet/leaflet.js"></script>
  <script>
(function () {
  const panel = document.getElementById("panel");
  const hint = document.getElementById("hint");
  const swLight = document.getElementById("swLight");
  const swRanges = document.getElementById("swRanges");
  const swCoverage = document.getElementById("swCoverage");
  const swFog = document.getElementById("swFog");
  const acDetail = document.getElementById("acDetail");

  const map = L.map("map", { zoomControl: true });
  const lightTiles = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
  });
  // Dark basemap (free-ish; subject to provider usage policy).
  const darkTiles = L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>'
  });

  let tileLoadFailed = false;
  function onTileErr() { tileLoadFailed = true; }
  lightTiles.on("tileerror", onTileErr);
  darkTiles.on("tileerror", onTileErr);

  // Default to dark mode.
  darkTiles.addTo(map);
  swLight.checked = false;
  swLight.addEventListener("change", () => {
    if (swLight.checked) {
      map.removeLayer(darkTiles);
      lightTiles.addTo(map);
    } else {
      map.removeLayer(lightTiles);
      darkTiles.addTo(map);
    }
    lastCoverageKey = null;
    updateCoverageOverlayIfNeeded({
      receiver: lastReceiver,
      coverage_farthest_points: lastCoveragePts || [],
      coverage_nm: lastCoverageNm,
    });
    updateFogOverlay();
  });

  /** Below aircraft markers/trails/rings (coverage + fog). */
  const underlay = L.layerGroup().addTo(map);
  const layers = L.layerGroup().addTo(map);
  let markers = {};
  let trailLayers = {};
  let didInitialView = false;
  let ringLayer = null;
  let coverageLayer = null;
  let fogLayer = null;
  let lastCoverageKey = null;
  let lastReceiver = null;
  let lastCoveragePts = null;
  let lastCoverageNm = null;
  let lastRingHits = null;
  let lastRingTotal = 0;
  let lastRingRates = null;
  let selectedHex = null;

  const defaultDetailHtml =
    '<p class="muted" style="margin:8px 0 0">Click an aircraft for full decoded fields.</p>';

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function hslAlt(altFt) {
    if (altFt == null || !Number.isFinite(altFt)) return "#888";
    const a = Math.max(0, Math.min(50000, altFt));
    const h = 240 - (a / 50000) * 260;
    if (swLight.checked) {
      return "hsl(" + h + ", 86%, 34%)";
    }
    return "hsl(" + h + ", 82%, 52%)";
  }

  function timeColor(t, t0, t1) {
    if (t1 <= t0) return swLight.checked ? "#143a5f" : "#0ad";
    const u = Math.max(0, Math.min(1, (t - t0) / (t1 - t0)));
    const h = 120 + u * 200;
    const lightness = swLight.checked ? 30 : 50;
    return "hsl(" + h + ", 80%, " + lightness + "%)";
  }

  function arrowIcon(trackDeg) {
    const rot = (trackDeg != null && Number.isFinite(trackDeg)) ? trackDeg : 0;
    const color = swLight.checked ? "#0f2136" : "#4ab8ff";
    const shadow = swLight.checked
      ? "0 0 2px rgba(255,255,255,0.95), 0 0 4px rgba(255,255,255,0.95)"
      : "0 0 3px #000, 0 0 6px #000";
    return L.divIcon({
      className: "ac-arrow-wrap",
      html: '<div class="ac-arrow" style="transform: rotate(' + (rot - 90) + 'deg);color:' + color + ';text-shadow:' + shadow + ';font-weight:700;">▶</div>',
      iconSize: [0, 0],
    });
  }

  function fmtAlt(x) { return x == null ? "—" : String(x) + " ft"; }
  function fmtNum(x, suf) {
    if (x == null || !Number.isFinite(x)) return "—";
    return String(x) + (suf || "");
  }

  function fmtBool3(v) {
    if (v === true) return "yes";
    if (v === false) return "no";
    return "—";
  }

  function fmtBaroQ(v) {
    if (v === true) return "Q (25 ft)";
    if (v === false) return "Mode C (100 ft)";
    return "—";
  }

  function fmtVertSrc(v) {
    if (v === true) return "baro";
    if (v === false) return "geom";
    return "—";
  }

  function row(dt, val) {
    const v = (val === null || val === undefined || val === "") ? "—" : String(val);
    return "<dt>" + escHtml(dt) + "</dt><dd>" + escHtml(v) + "</dd>";
  }

  function section(title) {
    return '<div class="ac-h2">' + escHtml(title) + "</div>";
  }

  function block(title, rowPairs) {
    let b = section(title) + '<dl class="ac-grid">';
    for (let i = 0; i < rowPairs.length; i++) {
      const p = rowPairs[i];
      b += row(p[0], p[1]);
    }
    b += "</dl>";
    return b;
  }

  function buildSortedRing(recv, pts) {
    const ok = pts.filter(p => p && p.lat != null && p.lon != null);
    if (ok.length < 3) return null;
    const decorated = ok.map(p => ({
      p,
      a: Math.atan2(
        p.lat - recv.lat,
        (p.lon - recv.lon) * Math.cos(recv.lat * Math.PI / 180)
      ),
    }));
    decorated.sort((x, y) => x.a - y.a);
    return decorated.map(x => [x.p.lat, x.p.lon]);
  }

  /** Ray casting; ring[i] = [lat, lon]. */
  function pointInPolygon(lat, lon, ring) {
    let inside = false;
    const n = ring.length;
    for (let i = 0, j = n - 1; i < n; j = i++) {
      const yi = ring[i][0], xi = ring[i][1];
      const yj = ring[j][0], xj = ring[j][1];
      const intersect = ((yi > lat) !== (yj > lat)) &&
        (lon < (xj - xi) * (lat - yi) / (yj - yi + 1e-15) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  function updateFogOverlay() {
    if (fogLayer) {
      underlay.removeLayer(fogLayer);
      fogLayer = null;
    }
    if (!swFog.checked) return;
    if (!lastReceiver || !lastCoveragePts || lastCoveragePts.length < 3) return;
    const ring = buildSortedRing(lastReceiver, lastCoveragePts);
    if (!ring || ring.length < 3) return;
    const bounds = map.getBounds();
    const g = L.layerGroup();
    const rows = 14, cols = 12;
    const south = bounds.getSouth(), west = bounds.getWest(), north = bounds.getNorth(), east = bounds.getEast();
    const dLat = (north - south) / rows;
    const dLon = (east - west) / cols;
    const fillOp = swLight.checked ? 0.11 : 0.17;
    const fogColor = swLight.checked ? "#1a2734" : "#030810";
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const sw = [south + r * dLat, west + c * dLon];
        const ne = [south + (r + 1) * dLat, west + (c + 1) * dLon];
        const mlat = (sw[0] + ne[0]) / 2, mlon = (sw[1] + ne[1]) / 2;
        if (pointInPolygon(mlat, mlon, ring)) continue;
        L.rectangle([sw, ne], {
          stroke: false,
          fillColor: fogColor,
          fillOpacity: fillOp,
          interactive: false,
        }).addTo(g);
      }
    }
    g.addTo(underlay);
    fogLayer = g;
  }

  function resetDetailPanel() {
    selectedHex = null;
    acDetail.innerHTML = defaultDetailHtml;
    clearTrails();
  }

  function showPanel(ac) {
    const flightDisp = escHtml(((ac.flight || "").trim() || "(no callsign)"));
    const hex = escHtml(ac.hex || "");
    const trl = ac.trail || [];
    const trlN = trl.length;
    let trailSummary = String(trlN) + " pts";
    if (trlN >= 2) {
      const a = trl[0], b = trl[trlN - 1];
      trailSummary += " · t " + fmtNum(a.t, "s") + "→" + fmtNum(b.t, "s");
    }

    let html = '<div class="ac-detail">';
    html += "<h3>" + flightDisp + " <span class=\"muted\">" + hex + "</span></h3>";

    html += block("Identity", [
      ["ICAO hex", ac.hex],
      ["Callsign", (ac.flight || "").trim() || "—"],
      ["DF CA (capability)", ac.capability_ca != null ? String(ac.capability_ca) : "—"],
      ["Emitter category (EC)", ac.emitter_category_ec != null ? String(ac.emitter_category_ec) : "—"],
    ]);
    html += block("Position", [
      ["Latitude", fmtNum(ac.lat, "°")],
      ["Longitude", fmtNum(ac.lon, "°")],
      ["On ground", fmtBool3(ac.on_ground)],
    ]);
    html += block("Altitude", [
      ["Baro altitude", fmtAlt(ac.alt_baro)],
      ["Baro quantisation", fmtBaroQ(ac.baro_alt_is_q)],
      ["GNSS / geom height", fmtAlt(ac.geom_alt_ft)],
      ["Geom Q-bit", fmtBool3(ac.geom_alt_is_q)],
    ]);
    html += block("Motion", [
      ["Ground speed", ac.gs != null && Number.isFinite(ac.gs) ? ac.gs.toFixed(0) + " kt" : "—"],
      ["Track", fmtNum(ac.track, "°")],
      ["Vertical rate", ac.vert_rate != null ? String(ac.vert_rate) + " fpm" : "—"],
      ["Vert. rate source", fmtVertSrc(ac.vert_rate_is_baro)],
    ]);
    html += block("Radio", [
      ["Squawk", ac.squawk != null ? String(ac.squawk).padStart(4, "0") : "—"],
    ]);
    html += block("Position / velocity quality", [
      ["Surv. status (SS)", ac.pos_ss != null ? String(ac.pos_ss) : "—"],
      ["NIC supplement B", ac.pos_nic_b != null ? String(ac.pos_nic_b) : "—"],
      ["Velocity subtype", ac.vel_subtype != null ? String(ac.vel_subtype) : "—"],
      ["NAC velocity", ac.nac_v != null ? String(ac.nac_v) : "—"],
      ["Geom − baro (ft)", ac.geom_delta_ft != null ? String(ac.geom_delta_ft) : "—"],
    ]);
    html += block("Range & trail", [
      ["Range to receiver", ac.range_nm != null && Number.isFinite(ac.range_nm) ? ac.range_nm.toFixed(2) + " NM" : "—"],
      ["Max range (24h)", ac.max_range_24h_nm != null && Number.isFinite(ac.max_range_24h_nm) ? ac.max_range_24h_nm.toFixed(2) + " NM" : "—"],
      ["Trail", trailSummary],
    ]);
    html += block("Operational status (TC 31)", [
      ["ADS-B version", ac.ads_b_version != null ? String(ac.ads_b_version) : "—"],
      ["ME subtype (air/surf)", ac.op_mesub != null ? (ac.op_mesub === 1 ? "1 surface" : "0 airborne") : "—"],
      ["NIC-A", ac.op_nic_a != null ? String(ac.op_nic_a) : "—"],
      ["NIC-C", ac.op_nic_c != null ? String(ac.op_nic_c) : "—"],
      ["NACp", ac.op_nac_p != null ? String(ac.op_nac_p) : "—"],
      ["SIL", ac.op_sil != null ? String(ac.op_sil) : "—"],
      ["SIL reporting", ac.op_sil_per_sample === true ? "per sample" : ac.op_sil_per_sample === false ? "per hour" : "—"],
      ["GVA", ac.op_gva != null ? String(ac.op_gva) : "—"],
      ["NICbaro", ac.op_nic_baro != null ? String(ac.op_nic_baro) : "—"],
      ["NACv (surface)", ac.op_nac_v_surface != null ? String(ac.op_nac_v_surface) : "—"],
    ]);
    html += block("Meta", [
      ["Last seen", ac.seen != null ? ac.seen.toFixed(2) + " s ago" : "—"],
      ["Message count", ac.msg_count != null ? String(ac.msg_count) : "—"],
      ["Last confidence", ac.last_conf != null && Number.isFinite(ac.last_conf) ? ac.last_conf.toFixed(4) : "—"],
    ]);

    html += '<div class="ac-hint">Trail on map: older→newer hue; segment color = baro alt, else GNSS height when set.</div>';
    html += "</div>";
    acDetail.innerHTML = html;
  }

  function drawTrail(hex, ac) {
    if (trailLayers[hex]) {
      layers.removeLayer(trailLayers[hex]);
      delete trailLayers[hex];
    }
    const pts = ac.trail || [];
    if (pts.length < 2) return;
    const t0 = pts[0].t, t1 = pts[pts.length - 1].t;
    const g = L.layerGroup();
    for (let i = 1; i < pts.length; i++) {
      const a = pts[i - 1], b = pts[i];
      const cAlt = (b.alt != null) ? b.alt : a.alt;
      const color = (cAlt != null) ? hslAlt(cAlt) : timeColor(b.t, t0, t1);
      L.polyline([[a.lat, a.lon], [b.lat, b.lon]], { color, weight: 3, opacity: 0.85 }).addTo(g);
    }
    g.on("click", (ev) => {
      if (ev.originalEvent) L.DomEvent.stopPropagation(ev.originalEvent);
    });
    g.addTo(layers);
    trailLayers[hex] = g;
  }

  function clearTrails() {
    for (const k in trailLayers) {
      layers.removeLayer(trailLayers[k]);
    }
    trailLayers = {};
  }

  /** Statute miles (labels say "mi") — matches 100/200/300 mile rings. */
  function statMiToMeters(mi) { return mi * 1609.344; }
  const EARTH_R_M = 6371000;
  /** Latitude offset (deg) for distance R meters due north along meridian. */
  function northLatOffsetDeg(Rm) {
    return (Rm / EARTH_R_M) * (180 / Math.PI);
  }

  function updateRingOverlay() {
    if (ringLayer) {
      layers.removeLayer(ringLayer);
      ringLayer = null;
    }
    if (!swRanges.checked) return;
    if (!lastReceiver) return;
    const g = L.layerGroup();
    const ringsMi = [50, 100, 150, 200];
    const ringColor = swLight.checked ? "#1f2d3d" : "#ffffff";
    const ringLabelColor = swLight.checked ? "#1a2734" : "#ffffff";
    const ringLabelShadow = swLight.checked
      ? "0 0 2px rgba(255,255,255,0.95), 0 0 4px rgba(255,255,255,0.95)"
      : "0 0 6px #000";
    for (const mi of ringsMi) {
      const Rm = statMiToMeters(mi);
      const emph = Math.max(0, (250 - mi) / 200); // 50mi strongest, 200mi weakest
      const strokeOpacity = (swLight.checked ? 0.22 : 0.12) + emph * (swLight.checked ? 0.45 : 0.35);
      const strokeWeight = (swLight.checked ? 1.1 : 0.8) + emph * 1.2;
      const labelOpacity = 0.35 + emph * 0.45;
      L.circle([lastReceiver.lat, lastReceiver.lon], {
        radius: Rm,
        color: ringColor,
        weight: strokeWeight,
        opacity: strokeOpacity,
        fillOpacity: 0.0,
        interactive: false,
      }).addTo(g);

      // Label at top (north) of circle: point on meridian through receiver.
      const latTop = lastReceiver.lat + northLatOffsetDeg(Rm);
      L.marker([latTop, lastReceiver.lon], {
        interactive: false,
        icon: L.divIcon({
          className: "ring-label",
          html: '<div style="color:' + ringLabelColor + ';opacity:' + labelOpacity.toFixed(2) + ';font-size:12px;text-shadow:' + ringLabelShadow + ';">' + mi + ' mi</div>',
          iconSize: [48, 18],
          iconAnchor: [24, 18],
        }),
      }).addTo(g);
    }
    g.addTo(layers);
    ringLayer = g;
  }

  swRanges.addEventListener("change", updateRingOverlay);

  function haversineNm(a, b) {
    // Fast-enough great-circle distance for UI coloring (receiver-centered).
    const d2r = Math.PI / 180;
    const lat1 = a.lat * d2r, lon1 = a.lon * d2r;
    const lat2 = b.lat * d2r, lon2 = b.lon * d2r;
    const dlat = lat2 - lat1, dlon = lon2 - lon1;
    const s1 = Math.sin(dlat / 2), s2 = Math.sin(dlon / 2);
    const x = s1 * s1 + Math.cos(lat1) * Math.cos(lat2) * s2 * s2;
    const c = 2 * Math.atan2(Math.sqrt(x), Math.sqrt(Math.max(0, 1 - x)));
    return (6371000 * c) / 1852.0; // meters → nautical miles
  }

  function coverageColor(u) {
    // u in [0,1]. Low resource: simple HSL ramp.
    const uu = Math.max(0, Math.min(1, u));
    const h = 35 + uu * 210; // orange→blue
    const s = 85;
    const l = swLight.checked ? 34 : 55;
    return "hsl(" + h + ", " + s + "%, " + l + "%)";
  }

  function updateCoverageOverlay(coveragePts, coverageNm) {
    if (coverageLayer) {
      underlay.removeLayer(coverageLayer);
      coverageLayer = null;
    }
    if (!swCoverage.checked) return;
    if (!lastReceiver) return;
    if (!Array.isArray(coveragePts) || coveragePts.length === 0) return;

    const g = L.layerGroup();
    const recv = lastReceiver;
    const maxNm = (coverageNm != null && Number.isFinite(coverageNm) && coverageNm > 0) ? coverageNm : null;

    // Points: show farthest point per bearing bin (max 72 points from backend).
    for (const p of coveragePts) {
      if (!p || p.lat == null || p.lon == null) continue;
      const nm = haversineNm(recv, p);
      const u = maxNm ? (nm / maxNm) : Math.min(1, nm / 200.0);
      L.circleMarker([p.lat, p.lon], {
        radius: 3,
        weight: swLight.checked ? 1 : 0,
        opacity: swLight.checked ? 0.55 : 0.0,
        color: swLight.checked ? "#0f2136" : "#000",
        fillColor: coverageColor(u),
        fillOpacity: swLight.checked ? (0.45 + 0.35 * u) : (0.30 + 0.45 * u),
        interactive: false,
      }).addTo(g);
    }

    // Outline: a thin polygon-ish loop so you can read coverage shape at a glance.
    // Backend already bins by bearing; the points come out in bin order.
    const line = [];
    for (const p of coveragePts) {
      if (!p || p.lat == null || p.lon == null) continue;
      line.push([p.lat, p.lon]);
    }
    if (line.length >= 3) {
      L.polyline(line.concat([line[0]]), {
        color: swLight.checked ? "#1a2734" : "#ffffff",
        weight: swLight.checked ? 1.2 : 1.0,
        opacity: swLight.checked ? 0.22 : 0.14,
        interactive: false,
      }).addTo(g);
    }

    g.addTo(underlay);
    coverageLayer = g;
  }

  function updateCoverageOverlayIfNeeded(data) {
    // Build a tiny key to avoid rebuilding layers every 1s tick when nothing changed.
    const pts = data.coverage_farthest_points;
    if (!swCoverage.checked) {
      lastCoverageKey = null;
      updateCoverageOverlay(null, null);
      return;
    }
    const recvKey = (data.receiver && data.receiver.lat != null && data.receiver.lon != null)
      ? (data.receiver.lat.toFixed(4) + "," + data.receiver.lon.toFixed(4))
      : "none";
    const len = Array.isArray(pts) ? pts.length : 0;
    let head = "";
    let tail = "";
    if (len > 0) {
      const a = pts[0], b = pts[len - 1];
      head = (a && a.lat != null && a.lon != null) ? (a.lat.toFixed(3) + "," + a.lon.toFixed(3)) : "";
      tail = (b && b.lat != null && b.lon != null) ? (b.lat.toFixed(3) + "," + b.lon.toFixed(3)) : "";
    }
    const nm = (data.coverage_nm != null && Number.isFinite(data.coverage_nm)) ? data.coverage_nm.toFixed(2) : "n";
    const key = recvKey + "|" + nm + "|" + len + "|" + head + "|" + tail + "|" + (swLight.checked ? "L" : "D");
    if (key === lastCoverageKey) return;
    lastCoverageKey = key;
    updateCoverageOverlay(pts, data.coverage_nm);
  }

  swCoverage.addEventListener("change", () => {
    lastCoverageKey = null;
    updateCoverageOverlayIfNeeded({
      receiver: lastReceiver,
      coverage_farthest_points: lastCoveragePts || [],
      coverage_nm: lastCoverageNm,
    });
  });

  swFog.addEventListener("change", () => {
    updateFogOverlay();
  });

  map.on("moveend", () => {
    if (swFog.checked) updateFogOverlay();
  });

  async function tick() {
    try {
      const r = await fetch("/aircraft.json", { cache: "no-store" });
      if (!r.ok) throw new Error(r.status);
      const data = await r.json();
      lastReceiver = data.receiver || null;
      const cf = data.coverage_farthest_points;
      lastCoveragePts = Array.isArray(cf) && cf.length > 0 ? cf : null;
      lastCoverageNm = (data.coverage_nm != null && Number.isFinite(data.coverage_nm)) ? data.coverage_nm : null;
      lastRingHits = Array.isArray(data.ring_hits) ? data.ring_hits : null;
      lastRingTotal = (data.ring_total_ranged_hits != null) ? data.ring_total_ranged_hits : 0;
      lastRingRates = Array.isArray(data.ring_rate_ewma_per_min) ? data.ring_rate_ewma_per_min : null;
      updateRingOverlay();
      updateCoverageOverlayIfNeeded(data);
      updateFogOverlay();

      let hintLine =
        "now: " + (data.now != null ? data.now.toFixed(3) : "?") + " s  ·  " +
        (data.aircraft || []).length + " ac" +
        (lastRingHits ? ("  ·  hits<=50/100/150/200mi: " + lastRingHits.map(x => String(x)).join("/") ) : "") +
        (lastRingRates ? ("  ·  ewma/min<=50/100/150/200mi: " + lastRingRates.map(x => (Number.isFinite(x) ? x.toFixed(2) : "0.00")).join("/") ) : "");
      if (tileLoadFailed) {
        hintLine += "  ·  map tiles: offline/blocked (allow HTTPS to tile servers)";
      }
      hint.textContent = hintLine;

      const have = new Set();
      for (const ac of data.aircraft || []) {
        const hex = ac.hex;
        if (!hex || ac.lat == null || ac.lon == null) continue;
        have.add(hex);
        const trk = ac.track;
        if (!markers[hex]) {
          const m = L.marker([ac.lat, ac.lon], { icon: arrowIcon(trk) });
          m.on("click", (ev) => {
            if (ev.originalEvent) L.DomEvent.stopPropagation(ev.originalEvent);
            selectedHex = hex;
            const cur = markers[hex].last;
            clearTrails();
            showPanel(cur);
            drawTrail(hex, cur);
          });
          m.addTo(layers);
          markers[hex] = { m, last: ac };
        } else {
          const o = markers[hex];
          o.m.setLatLng([ac.lat, ac.lon]);
          o.m.setIcon(arrowIcon(trk));
          o.last = ac;
        }
      }

      for (const k of Object.keys(markers)) {
        if (!have.has(k)) {
          layers.removeLayer(markers[k].m);
          delete markers[k];
          if (trailLayers[k]) {
            layers.removeLayer(trailLayers[k]);
            delete trailLayers[k];
          }
        }
      }

      if (selectedHex && !markers[selectedHex]) resetDetailPanel();
      else if (selectedHex && markers[selectedHex]) {
        const cur = markers[selectedHex].last;
        showPanel(cur);
        drawTrail(selectedHex, cur);
      }

      if (!didInitialView) {
        if (data.receiver) {
          map.setView([data.receiver.lat, data.receiver.lon], 9, { animate: false });
          didInitialView = true;
        } else {
          const a = (data.aircraft || []).find(x => x.lat != null && x.lon != null);
          if (a) {
            map.setView([a.lat, a.lon], 7, { animate: false });
            didInitialView = true;
          }
        }
      }
    } catch (e) {
      hint.textContent = "fetch error: " + e;
    }
  }

  map.on("click", () => {
    resetDetailPanel();
  });

  map.setView([39.5, -98.35], 4);
  tick();
  setInterval(tick, 1000);
})();
  </script>
</body>
</html>
